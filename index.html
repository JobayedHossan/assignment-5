
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./style.css">
  <title>Login</title>

</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="card w-96 bg-white shadow-xl p-6">
  <div class="flex justify-center">
      <img src="./assets/github-logo.png" alt="">
  </div>
     
  <h2 class="text-2xl font-bold text-center">GitHub Issues Tracker</h2>
  <p class="text-center text-gray-500">Sign in to manage your issues</p>
    <p class="mt-5">Username</p>
  <input id="username" type="text" placeholder="Username" class="input input-bordered w-full mt-4" />
      <p class="text-[#4A00FF]">Default: admin.</p>

  <p class="mt-2">Password</p>
  <input id="password" type="password" placeholder="Password" class="input input-bordered w-full mt-2" />
     <p class="text-[#4A00FF]">Default: admin123</p>

  <button onclick="login()" class="btn btn-primary mt-4 w-full">Login</button>

</div>

<script src="./script.js"></script>
</body>
</html>
