<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
      <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
</head>
<body class="bg-gray-100">
<div class="max-w-7xl mx-auto p-4">

    <!-- Navbar -->
 <div class="navbar bg-white shadow px-6 rounded-xl mb-6">
  <div class="flex-1">
    <div class="mr-2">
<img src="./assets/github-logo2.png" alt="">
    </div>
    
    <h1 class="font-bold text-lg">GitHub Issues Tracker</h1>
  </div>
<div class="flex gap-2 items-center">

  <input 
    id="searchInput"
    type="text"
    placeholder="Search issues..."
    class="input input-bordered w-64"
  />

  <button onclick="handleSearchClick()" class="btn btn-primary btn-sm">
    Search
  </button>

</div>
</div>
 <!-- Tabs + Summary -->
  <div class="bg-white rounded-xl shadow p-4 mb-4">

    <!-- Tabs -->
    <div class="flex items-center gap-4 border-b pb-2 mb-3">
      <button class="tab tab-active" onclick="setTab(event,'all')">All</button>
      <button class="tab" onclick="setTab(event,'open')">Open</button>
      <button class="tab" onclick="setTab(event,'closed')">Closed</button>
    </div>

    <!-- Info Row -->
    <div class="flex justify-between items-center text-sm text-gray-500">
      <div class="flex items-center gap-2">
        <span><img src="" alt=""></span>
        <span id="issueCount">Issues loaded</span>
      </div>

      <div class="flex gap-3">
     <span class="text-green-500">● Open</span>
        <span class="text-purple-500">● Closed</span>
      </div>
    </div>
  </div>

  <div id="loader" class="text-center hidden"> class="text-center hidden">
    <span class="loading loading-spinner loading-lg"></span>
  </div>
 <!-- Cards -->
  <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
</div>
<!-- Modal -->
<dialog id="modal" class="modal">
  <div class="modal-box bg-white max-w-md rounded-md p-5">

    <h3 id="modalTitle" class="font-semibold text-base mb-2"></h3>

    <div class="flex items-center gap-2 text-xs mt-3 ">
      <span id="modalStatusBadge"></span>
      <p class="pb-4" id="modalMeta" class="text-xs text-gray-400 "></p>
    </div>

    <div class="flex gap-2 mb-3">
      <span id="modalType"></span>
      <span id="modalLabel"></span>
    </div>

    <p id="modalDescription" class="text-sm text-gray-600 mb-4"></p>

    <div class="flex justify-between text-sm mb-4">
      <div>
        <p class="text-gray-400 text-xs">Assignee:</p>
        <p id="modalAuthor"></p>
      </div>

      <div>
        <p class="text-gray-400 text-xs">Priority:</p>
        <p id="modalPriority"></p>
      </div>
    </div>

    <div class="flex justify-end">
      <form method="dialog">
        <button class="btn btn-primary btn-xs">Close</button>
      </form>
    </div>

  </div>
</dialog>

<script src="./script.js"></script>
</body>
</html>
